<!DOCTYPE html>  
<html lang="es">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>GLOBO ART</title>  
    <link rel="preconnect" href="https://fonts.googleapis.com">  
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">  

    <style>  
        body {  
            margin: 0;  
            font-family: 'Poppins', sans-serif;  
            background: linear-gradient(135deg, #5b2c83, #8e44ad, #c39bd3);  
            min-height: 100vh;  
            color: white;  
        }  

        header {  
            background: #ff4d6d;  
            color: white;  
            padding: 30px;  
            text-align: center;  
        }  

        header h1 {  
            margin: 0;  
            font-size: 40px;  
        }  

        header p {  
            font-size: 18px;  
        }  

        .hero {  
            text-align: center;  
            padding: 80px 20px;  
            height: 400px;  
            background-image: url('https://images.unsplash.com/photo-1578985545062-69928b1d9587');  
            background-size: cover;  
            background-position: center;  
            display: flex;  
            flex-direction: column;  
            justify-content: center;  
            align-items: center;  
            color: white;  
            font-size: 40px;  
            font-weight: bold;  
            text-shadow: 2px 2px 10px black;  
        }  

        .hero h1 {  
            font-size: 3rem;  
            margin-bottom: 15px;  
            font-weight: 700;  
        }  

        .hero p {  
            font-size: 1.2rem;  
            color: #f3e5f5;  
            margin-bottom: 30px;  
        }  

        .hero-btn {  
            background: white;  
            color: #6c3483;  
            border: none;  
            padding: 15px 35px;  
            border-radius: 50px;  
            font-size: 1rem;  
            cursor: pointer;  
            transition: 0.3s;  
            font-weight: bold;  
        }  

        .hero-btn:hover {  
            transform: scale(1.05);  
        }  

        nav {  
            background: #ff758f;  
            padding: 15px;  
            text-align: center;  
        }  

        nav a {  
            color: white;  
            margin: 0 15px;  
            text-decoration: none;  
            font-weight: bold;  
        }  

        .section {  
            padding: 50px 20px;  
            text-align: center;  
        }  

        .galeria {  
            display: grid;  
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));  
            gap: 20px;  
            padding: 20px;  
        }  

        .card {  
            background: rgba(255, 255, 255, 0.12);  
            backdrop-filter: blur(10px);  
            border-radius: 25px;  
            overflow: hidden;  
            margin: 30px auto;  
            width: 90%;  
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);  
            transition: all 0.4s ease;  
            border: 1px solid rgba(255, 255, 255, 0.2);  
        }  

        .card:hover {  
            transform: translateY(-10px);  
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);  
        }  

        .card img {  
            width: 100%;  
            height: 250px;  
            object-fit: cover;  
        }  

        .card h3 {  
            margin: 15px 0;  
        }  

        .formulario {  
            max-width: 600px;  
            margin: auto;  
            background: white;  
            padding: 30px;  
            border-radius: 15px;  
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);  
        }  

        .formulario input,  
        .formulario textarea,  
        .formulario select {  
            width: 100%;  
            padding: 12px;  
            margin: 10px 0;  
            border-radius
